<!-- Loading Screen -->
<div class="loading-screen" [class.hidden]="!isLoading()">
  <div class="loader">
    <div class="logo-text">MB.</div>
    <div class="progress-bar">
      <div class="fill"></div>
    </div>
    <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);">Loading
      portfolio...</span>
  </div>
</div>

<!-- Scroll Progress -->
<div class="scroll-progress" [style.width.%]="scrollProgress()"></div>

<!-- Custom Cursor (desktop only) -->
<div class="cursor" [style.left.px]="cursorX()" [style.top.px]="cursorY()"></div>
<div class="cursor cursor-ring" [style.left.px]="cursorX() - 13" [style.top.px]="cursorY() - 13"></div>

<!-- Main App -->
<div [attr.data-theme]="theme()" id="app-root">
  <app-header (themeToggle)="toggleTheme()" [currentTheme]="theme()"></app-header>

  <main id="main-content">
    <section id="home"><app-hero></app-hero></section>
    <section id="about"><app-about></app-about></section>
    <section id="skills"><app-skills></app-skills></section>
    <section id="services"><app-services></app-services></section>
    <section id="experience"><app-experience></app-experience></section>
    <section id="projects"><app-projects></app-projects></section>
    <section id="contact"><app-contact></app-contact></section>
  </main>

  <app-footer></app-footer>
</div>
